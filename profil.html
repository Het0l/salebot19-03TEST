<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Aura Market</h1>
                </div>
                
                <nav>
                    <ul>
                        <li><a href="index.html">Назад</a></li>
                    </ul>
                </nav>
                

            </div>
        </div>
    </header> 
<section class="register">
    <div class="user-profile">
        <img id="userPhoto" src="" alt="Аватар" class="user-avatar" onerror="this.src='https://via.placeholder.com/80?text=нет+фото';">
        <div class="user-info">
            <div id="userName" class="user-name">Загрузка...</div>
            <div id="userUsername" class="user-username">@username</div>
            <div id="userId" class="user-id">ID: —</div>
        </div>
    </div>
</section>
<div id="debug" style="padding:16px; background:#000; color:#0f0; font-family:monospace; white-space:pre-wrap; margin:16px; border-radius:8px;">
DEBUG: ждём initData...
</div>

<script>
  const debug = document.getElementById('debug');
  
  function log(s) {
    debug.innerHTML += s + '\n';
  }

  log('Telegram.WebApp существует: ' + !!window.Telegram?.WebApp);

  if (window.Telegram?.WebApp) {
    const tg = Telegram.WebApp;
    tg.ready();
    tg.expand();

    log('Версия: ' + tg.version);
    log('Платформа: ' + tg.platform);
    log('initData: ' + (tg.initData ? 'есть (' + tg.initData.length + ' символов)' : 'пусто'));
    log('initDataUnsafe: ' + (tg.initDataUnsafe ? 'есть' : 'undefined'));

    if (tg.initDataUnsafe) {
      log(JSON.stringify(tg.initDataUnsafe, null, 2));
      
      if (tg.initDataUnsafe.user) {
        log('USER НАЙДЕН!');
        log('ID: ' + tg.initDataUnsafe.user.id);
        log('first_name: ' + tg.initDataUnsafe.user.first_name);
        log('username: ' + (tg.initDataUnsafe.user.username || 'нет'));
      } else {
        log('user → отсутствует');
      }
    }
  } else {
    log('ОШИБКА: Telegram.WebApp не загрузился');
  }
</script>
