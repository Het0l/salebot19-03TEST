<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org"></script>
    <script src="profil.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Aura Market</h1>
                </div>
                
                <nav>
                    <ul>
                        <li><a href="index.html">Назад</a></li>
                    </ul>
                </nav>
                

            </div>
        </div>
    </header> 
<main class="container" style="padding: 40px 20px; max-width: 500px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 30px; color: #a3d5ff;">Ваш профиль</h2>

    <div style="background: rgba(255,255,255,0.08); padding: 30px; border-radius: 16px; text-align: center; border: 1px solid rgba(74,158,255,0.3);">
        
        <img id="avatar" 
             src="https://via.placeholder.com/120?text=?" 
             alt="Аватар" 
             style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom:20px; border: 3px solid #4a9eff;">

        <h3 id="displayName" style="font-size: 1.8rem; margin-bottom: 8px;">Загрузка...</h3>
        <p id="telegramInfo" style="color: #a3d5ff; margin-bottom: 30px; font-size: 1.1rem;">Telegram ID: —</p>

        <div style="text-align: left; margin: 30px 0;">
            <label for="tradeLink" style="display: block; margin-bottom: 10px; font-weight: 500; font-size: 1.1rem;">Steam Trade Link</label>
            <input type="text" id="tradeLink" placeholder="https://steamcommunity.com/tradeoffer/new/?partner=..." 
                   style="width:100%; padding:14px; border-radius:10px; border:1px solid #4a9eff; background:rgba(255,255,255,0.05); color:white; font-size:1rem;">
        </div>

        <button id="saveBtn" style="background:#4a9eff; color:white; border:none; padding:14px 50px; border-radius:10px; font-size:1.1rem; cursor:pointer; font-weight:600;">
            Сохранить
        </button>

        <p id="message" style="margin-top:20px; min-height:1.5em; font-size:1.1rem;"></p>
    </div>
</main>
