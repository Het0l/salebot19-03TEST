<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Aura Market</h1>
                </div>
                <nav>
                    <ul>
                        <li><a href="index.html">Назад</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section class="register">
        <div class="user-profile">
            <img id="userPhoto" src="https://via.placeholder.com/80?text=..." alt="Аватар" class="user-avatar">
            <div class="user-info">
                <div id="userName" class="user-name">Загрузка...</div>
                <div id="userUsername" class="user-username">@username</div>
                <div id="userId" class="user-id">ID: —</div>
            </div>
        </div>

        <!-- Отладочный блок (можно удалить позже) -->
        <div id="debugInfo" style="margin: 20px; padding: 16px; background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 13px; border-radius: 12px; white-space: pre-wrap; max-height: 300px; overflow: auto;">
            DEBUG INFO<br>Ожидание данных...
        </div>
    </section>

    <script src="register.js"></script>
</body>
</html>
